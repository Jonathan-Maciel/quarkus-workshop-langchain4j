# LLM - Ollama (OpenAI-compatible API)
quarkus.langchain4j.openai.base-url=http://localhost:11434/v1
quarkus.langchain4j.openai.api-key=ollama
quarkus.langchain4j.openai.chat-model.model-name=granite4.1:8b
quarkus.langchain4j.openai.chat-model.log-requests=true
quarkus.langchain4j.openai.chat-model.log-responses=true
quarkus.langchain4j.timeout=1m

# OpenTelemetry / Instana
quarkus.otel.sdk.disabled=false
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=true
quarkus.otel.traces.enabled=true
# Tag this service so it appears on the Instana GenAI observability dashboard
quarkus.otel.resource.attributes=service.name=${OTEL_SERVICE_NAME:miles-of-smiles},\
  application.name=${APPLICATION_NAME:miles-of-smiles},\
  INSTANA_PLUGIN=genai
